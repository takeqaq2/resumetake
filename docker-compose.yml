services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resume-frontend
    restart: unless-stopped
    environment:
      - PUBLIC_ADS_ENABLED=${PUBLIC_ADS_ENABLED:-false}
      - PUBLIC_ADS_TEST_MODE=${PUBLIC_ADS_TEST_MODE:-false}
      - PUBLIC_GOOGLE_ADSENSE_CLIENT=${PUBLIC_GOOGLE_ADSENSE_CLIENT:-}
      - PUBLIC_AD_SLOT_HOME=${PUBLIC_AD_SLOT_HOME:-}
      - PUBLIC_AD_SLOT_JOBS=${PUBLIC_AD_SLOT_JOBS:-}
      - PUBLIC_AD_SLOT_GENERATE=${PUBLIC_AD_SLOT_GENERATE:-}
    pids_limit: 100
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/en',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - resume-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-backend
    restart: unless-stopped
    network_mode: host
    environment:
      - PORT=8000
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DOUBAO_API_KEY=${DOUBAO_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - PAYPAL_CLIENT_ID=${PAYPAL_CLIENT_ID:-}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET:-}
      - PAYPAL_MODE=${PAYPAL_MODE:-production}
      - PAYPAL_WEBHOOK_ID=${PAYPAL_WEBHOOK_ID:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - ENABLE_GENERATE_RESUME=${ENABLE_GENERATE_RESUME:-true}
      - USER_DATA_FILE=/app/data/users.json
      - DATABASE_PATH=/app/data/resumetake.db
      - MAILER_WORKER_URL=${MAILER_WORKER_URL:-}
      - MAILER_API_KEY=${MAILER_API_KEY:-}
      - OCR_API_KEY=${OCR_API_KEY:-}
      - OCR_API_URL=${OCR_API_URL:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - DOMAIN=${DOMAIN:-resume.takee.top}
      - CONTACT_EMAIL=${CONTACT_EMAIL:-takeqaq@gmail.com}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://resume.takee.top}
      - ENABLE_API_DOCS=${ENABLE_API_DOCS:-false}
    volumes:
      - backend-data:/app/data
    mem_limit: 1g
    pids_limit: 200
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx:1.27-alpine3.21
    container_name: resume-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/security-headers.conf:/etc/nginx/security-headers.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 256m
    pids_limit: 100
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/en"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      - frontend
      - backend
    networks:
      - resume-net

networks:
  resume-net:
    driver: bridge

volumes:
  backend-data:
