<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ResumeTake">
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large">
  <meta name="author" content="ResumeTake">
  <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0b0f1a" media="(prefers-color-scheme: dark)">
  <meta name="color-scheme" content="light dark">
  <meta property="og:type" content="website">
  <script>
    // UI1: apply explicit theme choice before paint to avoid FOUC.
    // When localStorage 'theme' is unset, fall back to OS preference via @media.
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || t === 'light') {
          document.documentElement.dataset.theme = t;
        }
      } catch (e) {}
    })();
  </script>
  <meta property="og:site_name" content="ResumeTake">
  <meta name="twitter:card" content="summary_large_image">
  %sveltekit.head%
  <style>
    .skip-link {
      position: absolute;
      top: -40px;
      inset-inline-start: 0;
      background: var(--primary);
      color: white;
      padding: 8px 16px;
      z-index: 100;
      transition: top 0.2s;
    }
    .skip-link:focus { top: 0; }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <div id="app">%sveltekit.body%</div>
</body>
</html>
