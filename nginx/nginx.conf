worker_processes auto;

events { worker_connections 4096; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    client_max_body_size 3M;
    server_tokens off;

    # Log format that strips query strings from the request line to avoid
    # logging sensitive parameters (order_id, search terms, resume IDs).
    log_format safe '$remote_addr - $remote_user [$time_local] '
                     '"$request_method $uri" $status $body_bytes_sent '
                     '"$http_referer" "$http_user_agent" '
                     'rt=$request_time uct="$upstream_connect_time" '
                     'urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log safe;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2
        application/ld+json
        application/manifest+json;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=optimize:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=connlimit:10m;

    upstream frontend { server frontend:8080; }
    upstream backend { server host.docker.internal:8000; }

    server {
        listen 80;
        server_name resume.takee.top;

        # Security headers (included in every location with its own add_header
        # to work around nginx's inheritance rule: a location-level add_header
        # silently drops ALL server-level add_header directives).
        include /etc/nginx/security-headers.conf;

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            # Never cache HTML (contains hashed JS references that change per build)
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            add_header Pragma "no-cache";
        }

        # API - General rate limit
        location /api {
            limit_req zone=api burst=20 nodelay;
            limit_conn connlimit 20;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Optimize endpoint (SSE) - rate limit + long timeout matching backend WriteTimeout 300s
        location /api/v1/optimize {
            limit_req zone=optimize burst=10 nodelay;
            limit_req_status 429;
            error_page 429 =429 @rate_limited_json;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            # Disable buffering for SSE streaming
            proxy_buffering off;
            proxy_cache off;
        }

        # JSON response for rate-limited API requests (avoids HTML 503/429)
        location = @rate_limited_json {
            default_type application/json;
            return 429 '{"success":false,"error":"TOO_MANY_REQUESTS","message":"Too many requests, please try again later"}';
        }

        # Other AI endpoints - rate limit
        location ~ ^/api/v1/(perspective|generate-resume|upload|scrape-job|cover-letter|linkedin-optimize|interview-practice) {
            limit_req zone=optimize burst=5 nodelay;
            limit_req_status 429;
            error_page 429 =429 @rate_limited_json;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Immutable assets - 1 year cache
        location ~* ^/_app/immutable/ {
            proxy_pass http://frontend;
            expires 1y;
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Static assets - Aggressive caching
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff2|woff|ttf|eot)$ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            expires 365d;
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # CSS/JS - Force revalidation (no-cache makes Cloudflare check origin)
        location ~* \.(css|js)$ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "public, no-cache, must-revalidate";
            add_header Pragma "no-cache";
            access_log off;
        }

        # Health check - no logging
        location = /api/health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # Metrics - no auth required
        location = /metrics {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        # Deny hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
