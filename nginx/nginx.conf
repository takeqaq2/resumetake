events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=optimize:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=connlimit:10m;

    upstream frontend { server frontend:8080; }
    upstream backend { server backend:8000; }

    server {
        listen 80;
        server_name resume.takee.top;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.groq.com https://api.deepseek.com https://ark.cn-beijing.volces.com https://generativelanguage.googleapis.com https://api.cerebras.ai https://api.siliconflow.cn https://open.bigmodel.cn" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # API - General rate limit
        location /api {
            limit_req zone=api burst=20 nodelay;
            limit_conn connlimit 20;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Optimize endpoint - Stricter rate limit
        location /api/v1/optimize {
            limit_req zone=optimize burst=3 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Static assets - Aggressive caching
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff2|woff|ttf|eot)$ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            expires 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # CSS/JS - Force revalidation (no-cache makes Cloudflare check origin)
        location ~* \.(css|js)$ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            add_header Cache-Control "public, no-cache, must-revalidate";
            add_header Pragma "no-cache";
            access_log off;
        }

        # Health check - no logging
        location = /api/health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # Deny hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
